<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="img/png" sizes="32x32" href="./images/favicon-32x32.png">

        <title>Projeto 1 | Order Summary Card</title>

        <style>
            body {
                margin: 0;
                background-color: hsl(225, 100%, 94%);
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: 'Red Hat Display', sans-serif;
            }

            .background-desktop {
                width: 1440px;
                position: fixed;
                z-index: -1;
            }

            .summary {
                margin: 80px 482px;
                background-color: white;
                display: flex;
                flex-direction: column;
                border-radius: 20px;
                /* box-shadow: 2px 2px 20; */
            }

            .hero {
                width: 100%;
                border-top-right-radius: 20px;
                border-top-left-radius: 20px;
            }

            p {
                font-size: 16px;
            }

            .icon-music {
                grid-area: icon-music;
                grid-row: 1 / 3;
                grid-column: 1 / 2;
            }

            .plan {
                grid-area: plan;
                grid-row: 1 / 2;
                grid-column: 2 / 3;
            }

            .price {
                grid-area: price;
                grid-row: 2 / 3;
                grid-column: 2 / 3;
            }

            .change {
                grid-area: change;
                grid-row: 1 / 3;
                grid-column: 3 / 4;
            }

            .payment {
                background-color: hsl(225, 100%, 98%);
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                grid-template-areas: 'icon-music plan change'
                                     'icon-music price change';
                align-items: center;

            }
            
        </style>
    </head>
    <body>
        <img class="background-desktop" src="./images/pattern-background-desktop.svg">
        <div class="summary">
            <img class="hero" src="./images/illustration-hero.svg">   
             <h1>
                 <strong>Order Summary</strong>
             </h1>
             <p>
                You can now listen to millions of songs, 
                audiobooks, and podcasts on any device 
                anywhere you like!
             </p>
             <div class="payment">
                 <img class="icon-music" src="./images/icon-music.svg">
                 <strong class="plan">Annual Plan</strong>
                 <p class="price">$59.99/year</p>
                 <a class="change" href="/change">Change</a>
             </div>
             <button>Proceed to Payment</button>
              <a href="/cancelOrder">Cancel Order</a>
        </div>
    </body>
</html>
