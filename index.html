<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="img/png" sizes="32x32" href="./images/favicon-32x32.png">

        <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

        <title>Projeto 1 | Order Summary Card</title>

        <style>

            :root {
                --pale-blue: hsl(225, 100%, 94%);
                --bright-blue: hsl(245, 75%, 52%);
                --very-pale-blue: hsl(225, 100%, 98%);
                --desaturated-blue: hsl(224, 23%, 55%);
                --dark-blue: hsl(223, 47%, 23%);
            }

            * {
                box-sizing: border-box;
            }
        
            body {
                font-family: 'Red Hat Display';
                margin: 0;
                height: 100vh;                
            }
            
            .container {
                display: flex;
                align-items: center;     
                justify-content: center;
                height: 100%;
                background-image: url('./images/pattern-background-desktop.svg');
                background-repeat: no-repeat;
                background-size: contain;
                background-position: top;       
                background-color: hsl(225, 100%, 98%);               
            }

            p {
                font-size: 16px;
                margin: 0;
            }
           
           .image {
                border-radius: 20px 20px 0px 0px;
                width: 100%;                
            }
                      
            .card {
                background-color: #fff;
                border-radius: 20px;
                max-width: 540px;
            }

            .card-content {
                text-align: center;
                padding: 40px;
            }

            .description {
                line-height: 24px;
                display: flex;
                justify-content: center;
                font-weight: 500;
                text-align: center;
                color: hsl(224, 23%, 55%);
                margin-bottom: pxs;
            }

            .description p {
                max-width: 340px;
                color: var(--desaturated-blue);
            }

            .plan {
                display: flex;
                align-items: center;
                background-color: hsl(225, 100%, 98%);
                width: 100%;
                height: 100px;
                padding: 20px;
                border-radius: 20px;
                margin-bottom: 40px;
            }

            .subscription {

            }

            .plan-type {
                font-weight: 700;
                text-align: start;
                color: var(--dark-blue);
            }

            .value {
                color: var(--desaturated-blue);
            }

            .music-icon {
                margin-right: 14px;
            }

            .change {
                font-weight: 700;
                margin-left: auto;
                color: var(--bright-blue);
            }

            .order-summary {
                font-size: 32px;
                font-weight: 900;
                color: var(--dark-blue);
                margin: 0 0 20px 0;
            }

            .button {
                display: block;
                width: 100%;
                text-decoration: none;
                text-align: center;
                padding: 15px 0px; 
                margin-bottom: 30px;
            }

            .highlight  {
                background-color: var(--bright-blue);
                color: #fff;
                font-weight: 700;
                border-radius: 10px;
            }

            .cancel {
                display: block;
                font-weight: 700;
                color: hsl(224, 23%, 55%);
                text-decoration: none;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <div class="card">
                <img class="image" src="./images/illustration-hero.svg">
                <div class="card-content">   
                    <h1 class="order-summary">Order Summary</h1>
                    <div class="description">
                        <p>
                            You can now listen to millions of songs, 
                            audiobooks, and podcasts on any device 
                            anywhere you like!
                        </p>
                    </div>
                    <div class="plan">
                        <img width="45" height="45" class="music-icon" src="./images/icon-music.svg">
                        <div class="subscription">   
                            <p class="plan-type">Annual Plan</p>
                            <p class="value">$59.99/year</p>
                        </div> 
                        <a class="change" href="/change">Change</a>
                    </div>
                        <a class="button highlight" href="/payment">Proceed to Payment</a>
                        <a class="cancel" href="/cancel">Cancel Order</a>
                </div>            
            </div>
        </div>
    </body>
</html>
